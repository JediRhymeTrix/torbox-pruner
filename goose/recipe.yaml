version: 1.0.0
title: TorBox Pruner
description: Runs prune.py every 10 minutes. Classifies torrents, prunes dead ones, fills slots, posts Telegram notifications. The script does everything — the model just runs it.

parameters:
  - key: install_dir
    input_type: string
    requirement: optional
    default: "~/torbox-pruner"
    description: "Absolute path to the torbox-pruner install directory"

prompt: "Run this command exactly: /usr/bin/python3 {{ install_dir }}/prune.py"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 120
    bundled: true
    available_tools:
      - shell

settings:
  goose_provider: openrouter
  goose_model: meta-llama/llama-3.1-8b-instruct:free
  temperature: 0.0
  max_turns: 2
