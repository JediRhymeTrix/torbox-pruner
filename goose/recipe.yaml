version: 1.0.0
title: TorBox Pruner
description: |
  Runs prune.py every 10 minutes. The script handles everything:
  classify torrents by TorBox API state, prune dead ones, backfill
  free slots from queue.jsonl, and post notifications directly to
  Telegram via notify.py. The recipe model just kicks it off.
instructions: |
  You are the TorBox pruner agent. Run the shell command below exactly
  as written, then stop. Do not read files. Do not post notifications.
  The script handles all of that itself.
prompt: |
  Run this exact command and report the last log line only:
  python3 INSTALL_DIR/prune.py
extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 180
    bundled: true
    available_tools: []
settings:
  goose_provider: openrouter
  goose_model: meta-llama/llama-3.1-8b-instruct:free
  temperature: 0.0
